name: Build Android APK

# Trigger build on every push to main + every PR. Manual dispatch also supported.
on:
  push:
    branches: [main]
    paths:
      - 'Assets/**'
      - 'Packages/**'
      - 'ProjectSettings/**'
      - '.github/workflows/build-android.yml'
  pull_request:
    branches: [main]
    paths:
      - 'Assets/**'
      - 'Packages/**'
      - 'ProjectSettings/**'
      - '.github/workflows/build-android.yml'
  workflow_dispatch:

# Cancel in-flight builds when a new commit lands on the same ref
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-android:
    name: Build Android (IL2CPP, ARM64)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 90
    env:
      # GameCI cần ít nhất một trong hai: UNITY_LICENSE (Personal, dán nội dung file .ulf)
      # hoặc UNITY_EMAIL + UNITY_PASSWORD + UNITY_SERIAL (Pro/Plus). Xem README phần "CI / GameCI".
      UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
      UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
      UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
      UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
    steps:
      # Free up disk space before pulling Unity docker image (~13GB).
      # ubuntu-latest only has ~14GB free by default; without this the
      # docker pull step fails with "no space left on device" while
      # extracting the Android editor image. We strip pre-installed tools
      # we don't need (haskell, dotnet, large/X11, hosted Android SDK) per
      # GameCI's recommended setup.
      - name: Free up disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: false
          swap-storage: false

      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0

      # Fail loudly if the project is not properly committed (a previous
      # silent-skip used to mask a missing ProjectVersion.txt and let CI
      # falsely pass on green).
      - name: Verify Unity project committed
        run: |
          if [ ! -f "ProjectSettings/ProjectVersion.txt" ]; then
            echo "::error::ProjectSettings/ProjectVersion.txt is missing."
            echo "::error::Open the project in Unity Editor 2022.3.45f1 once to generate ProjectSettings/, then commit it."
            exit 1
          fi
          if [ ! -f "Packages/manifest.json" ]; then
            echo "::error::Packages/manifest.json is missing — Unity packages will not resolve."
            exit 1
          fi

      # Fail loudly if no Unity license secret is configured. Previous
      # behavior was to silently skip the build step so PR checks looked
      # green, which let multiple compile errors and 44 test failures land
      # on main without anyone noticing. CI must require a real build.
      - name: Verify Unity license secret
        run: |
          if [ -n "$UNITY_LICENSE" ] || { [ -n "$UNITY_EMAIL" ] && [ -n "$UNITY_PASSWORD" ] && [ -n "$UNITY_SERIAL" ]; }; then
            echo "::notice::Unity license secret detected — proceeding with real build."
          else
            echo "::error::No Unity license secret configured."
            echo "::error::Add either secrets.UNITY_LICENSE (Personal, paste contents of .ulf file) or"
            echo "::error::secrets.UNITY_EMAIL + secrets.UNITY_PASSWORD + secrets.UNITY_SERIAL (Plus/Pro)."
            echo "::error::See repository README section 'CI / GameCI' for setup steps."
            exit 1
          fi

      - name: Cache Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-Android-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-Android-
            Library-

      - name: Build Unity (Android, IL2CPP)
        uses: game-ci/unity-builder@v4
        with:
          targetPlatform: Android
          androidExportType: androidPackage
          androidTargetSdkVersion: AndroidApiLevel34
          buildName: WildernessCultivation
          allowDirtyBuild: true
          unityVersion: auto

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: WildernessCultivation-${{ github.sha }}-apk
          path: build/Android
          if-no-files-found: warn
          retention-days: 14
