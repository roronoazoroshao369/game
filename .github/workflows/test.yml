name: Unity Tests

on:
  push:
    branches: [main]
    paths:
      - 'Assets/**'
      - 'Packages/**'
      - 'ProjectSettings/**'
      - '.github/workflows/test.yml'
  pull_request:
    branches: [main]
    paths:
      - 'Assets/**'
      - 'Packages/**'
      - 'ProjectSettings/**'
      - '.github/workflows/test.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Run EditMode + PlayMode tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    timeout-minutes: 60
    env:
      UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
      UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
      UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
      UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
    steps:
      # Free up disk space before pulling Unity docker image (~7GB base
      # + Library cache). ubuntu-latest only has ~14GB free by default.
      - name: Free up disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: false
          swap-storage: false

      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      # Fail loudly if the project is not properly committed.
      - name: Verify Unity project committed
        run: |
          if [ ! -f "ProjectSettings/ProjectVersion.txt" ]; then
            echo "::error::ProjectSettings/ProjectVersion.txt is missing."
            echo "::error::Open the project in Unity Editor 2022.3.45f1 once to generate ProjectSettings/, then commit it."
            exit 1
          fi
          if [ ! -f "Packages/manifest.json" ]; then
            echo "::error::Packages/manifest.json is missing — Unity packages will not resolve."
            exit 1
          fi

      # Fail loudly if no Unity license secret is configured. The previous
      # silent-skip masked 44 EditMode test failures (fixed in PR #41).
      - name: Verify Unity license secret
        run: |
          if [ -n "$UNITY_LICENSE" ] || { [ -n "$UNITY_EMAIL" ] && [ -n "$UNITY_PASSWORD" ] && [ -n "$UNITY_SERIAL" ]; }; then
            echo "::notice::Unity license secret detected — proceeding with real test run."
          else
            echo "::error::No Unity license secret configured."
            echo "::error::Add either secrets.UNITY_LICENSE (Personal, paste contents of .ulf file) or"
            echo "::error::secrets.UNITY_EMAIL + secrets.UNITY_PASSWORD + secrets.UNITY_SERIAL (Plus/Pro)."
            echo "::error::See repository README section 'CI / GameCI' for setup steps."
            exit 1
          fi

      - name: Cache Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-Test-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-Test-
            Library-

      - name: Run tests
        uses: game-ci/unity-test-runner@v4
        with:
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          testMode: all
          checkName: Unity Test Results
